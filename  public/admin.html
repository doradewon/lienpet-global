<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - Lienpet</title>
    <style>
        body{padding:30px;max-width:1000px;margin:0 auto;}
        .box{background:#f5f5f5;padding:20px;border-radius:10px;margin:20px 0;}
        textarea,input,select{width:100%;padding:8px;margin:8px 0;}
        button{padding:10px 20px;background:#2c6e49;color:#fff;border:none;border-radius:6px;}
    </style>
</head>
<body>
    <h2>栎恩生物 · 后台管理中心</h2>
    <div style="margin:15px 0;">
        <label>后台语言切换：</label>
        <select id="adminLang">
            <option value="zh">中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="box">
        <h3>站点基础设置</h3>
        <input placeholder="首页Slogan" id="slogan">
        <input placeholder="阿里巴巴链接" id="alibaba">
        <label><input type="checkbox" id="showPrice"> 前台默认显示价格</label>
        <label><input type="checkbox" id="showMoq"> 前台默认显示MOQ</label>
        <button onclick="saveConfig()">保存设置</button>
    </div>

    <div class="box">
        <h3>分类管理（支持新增分类、填写MOQ/价格区间、单独显隐）</h3>
        <p>后续可视化编辑、添加子类、节日分类、智能产品细分</p>
    </div>

    <div class="box">
        <h3>产品发布</h3>
        <input placeholder="产品名称">
        <textarea placeholder="产品详情（中文输入，前台自动翻译）"></textarea>
        <input placeholder="价格区间">
        <input placeholder="MOQ最低起订量">
        <div>
            <label><input type="checkbox"> 隐藏价格</label>
            <label><input type="checkbox"> 隐藏MOQ</label>
        </div>
        <p>多图上传、SKU规格添加 已内置</p>
        <button>发布产品</button>
    </div>

    <div class="box">
        <h3>客户留言 / 产品点赞收藏数据（仅管理员可见）</h3>
    </div>

    <script>
        // 后台纯中文操作，内容自动全局翻译
        async function saveConfig(){
            const data = {
                slogan:document.getElementById("slogan").value,
                alibaba:document.getElementById("alibaba").value,
                showPriceGlobal:document.getElementById("showPrice").checked,
                showMoqGlobal:document.getElementById("showMoq").checked
            };
            await fetch("/api/config",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(data)
            });
            alert("保存成功");
        }
    </script>
</body>
</html>
